<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<title>艦これドロップ検索</title>

<style>
body{font-family:sans-serif;background:#0f172a;color:white;margin:0;}
header{background:#1e293b;padding:14px;font-size:22px;font-weight:bold;}
.container{padding:15px;}
.panel{background:#1e293b;padding:15px;margin-bottom:15px;border-radius:12px;}
select{padding:8px;margin:5px;border-radius:8px;border:none;}
button{padding:8px 14px;background:#38bdf8;border:none;border-radius:8px;cursor:pointer;font-weight:bold;}

.shipInfo{
background:#020617;
padding:12px;
border-radius:12px;
margin-bottom:15px;
border-left:5px solid #22c55e;
}

.result{
background:#020617;
padding:12px;
margin-top:10px;
border-radius:10px;
cursor:pointer;
}

.detail{
display:none;
margin-top:8px;
background:#0b1220;
padding:8px;
border-radius:8px;
}
.hidden{display:none;}
</style>

</head>

<body>

<header>艦これ ドロップ検索</header>

<div class="container">

<div class="panel">

<label><input type="radio" name="mode" value="ship" checked onchange="switchMode()"> 艦から探す</label> <label style="margin-left:20px;"><input type="radio" name="mode" value="map" onchange="switchMode()"> 海域から探す</label>

<div id="shipSearch">
<br>
艦種:
<select id="type"></select>
艦名:
<select id="ship"></select>
<br><br>
<button onclick="searchShip()">検索</button>
</div>

<div id="mapSearch" class="hidden">
<br>
海域:
<select id="map"></select>
<br><br>
<button onclick="searchMap()">検索</button>
</div>

</div>

<div id="shipInfo"></div>

<div class="panel">
<h3>検索結果</h3>
<div id="results">データ読み込み中...</div>
</div>

</div>

<script>

let database={};
let shipIndex=[];
let mapIndex={};

const results=document.getElementById("results");

/* ---------- JSON読み込み ---------- */

async function loadDB(){
results.innerHTML="データ読み込み中...";

const res=await fetch("./data.json");
database=await res.json();

/* インデックス作成（ここが超重要：先に軽量化） */

for(const ship in database){

shipIndex.push(ship);

const data=database[ship];

for(const key in data){
if(key==="type"||key==="modify") continue;

if(!mapIndex[key]) mapIndex[key]=[];
mapIndex[key].push(ship);
}

}

initUI();
results.innerHTML="準備完了";
}

loadDB();

/* ---------- UI初期化 ---------- */

function initUI(){

/* 艦種 */
const typeSelect=document.getElementById("type");
const types=new Set();
shipIndex.forEach(s=>types.add(database[s].type));
typeSelect.innerHTML='<option value="">指定なし</option>';
types.forEach(t=>typeSelect.innerHTML+=`<option>${t}</option>`);

/* 艦名 */
const shipSelect=document.getElementById("ship");
function updateShips(){
shipSelect.innerHTML='<option value="">選択してください</option>';
shipIndex.forEach(s=>{
if(!typeSelect.value||database[s].type===typeSelect.value)
shipSelect.innerHTML+=`<option>${s}</option>`;
});
}
typeSelect.onchange=updateShips;
updateShips();

/* 海域 */
const mapSelect=document.getElementById("map");
mapSelect.innerHTML='<option value="">選択してください</option>';
Object.keys(mapIndex).sort().forEach(m=>{
mapSelect.innerHTML+=`<option>${m}</option>`;
});

}

/* ---------- 艦検索（分割描画） ---------- */

async function searchShip(){

const ship=document.getElementById("ship").value;
if(!ship) return;

document.getElementById("shipInfo").innerHTML="";
results.innerHTML="検索中...";

await new Promise(r=>setTimeout(r,50));

const shipData=database[ship];

/* 改造情報 */
let html="<div class='shipInfo'><b>"+ship+"</b><br>改造:<br>";
if(shipData.modify){
for(const m in shipData.modify)
html+=`${m} Lv${shipData.modify[m]}<br>`;
}
html+="</div>";
document.getElementById("shipInfo").innerHTML=html;

/* 分割描画 */
let buffer="";
let count=0;

for(const area in shipData){

if(area==="type"||area==="modify") continue;

const nodes=shipData[area];

for(const node in nodes){

const d=nodes[node];

buffer+=`
<div class="result">
<b>${area}</b> - マス ${node}<br>
勝利:${d.get_rank.join(",")}<br>
提督Lv:${d.level[0]}〜${d.level[1]}
</div>`;

count++;

/* 20件ごとに描画（これがフリーズ防止） */
if(count%20===0){
results.innerHTML+=buffer;
buffer="";
await new Promise(r=>setTimeout(r,0));
}

}

}

results.innerHTML+=buffer;

}

/* ---------- 海域検索（高速化版） ---------- */

async function searchMap(){

const map=document.getElementById("map").value;
if(!map) return;

document.getElementById("shipInfo").innerHTML="";
results.innerHTML="検索中...";

await new Promise(r=>setTimeout(r,50));

let buffer="";
let count=0;

const ships=mapIndex[map]||[];

for(const ship of ships){

const nodes=database[ship][map];

for(const node in nodes){

const d=nodes[node];

buffer+=`
<div class="result">
<b>${ship}</b> - マス ${node}<br>
勝利:${d.get_rank.join(",")}<br>
提督Lv:${d.level[0]}〜${d.level[1]}
</div>`;

count++;

if(count%20===0){
results.innerHTML+=buffer;
buffer="";
await new Promise(r=>setTimeout(r,0));
}

}

}

results.innerHTML+=buffer;

}

</script>

</body>
</html>
