<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<title>艦これドロップ検索</title>

<style>
body{font-family:sans-serif;background:#0f172a;color:white;margin:0;}
header{background:#1e293b;padding:14px;font-size:22px;font-weight:bold;}
.container{padding:15px;}
.panel{background:#1e293b;padding:15px;margin-bottom:15px;border-radius:12px;}
select,input{padding:8px;margin:5px;border-radius:8px;border:none;}
button{padding:8px 14px;background:#38bdf8;border:none;border-radius:8px;cursor:pointer;font-weight:bold;}
.result{background:#020617;padding:10px;margin-top:10px;border-radius:10px;border-left:5px solid #38bdf8;}
.detail{margin-top:8px;background:#0b1220;padding:8px;border-radius:8px;display:none;}
</style>

</head>

<body>

<header>艦これ ドロップ検索</header>

<div class="container">

<div class="panel">
<h3>検索条件</h3>

艦種: <select id="type"></select>

艦名: <select id="ship"></select>

海域: <select id="map"></select>

マス: <input id="node" placeholder="例:C">

勝利ランク: <select id="rank">

<option value="">指定なし</option>
<option>S</option>
<option>A</option>
<option>B</option>
</select>

<br><br> <button onclick="search()">検索</button>

</div>

<div class="panel">
<h3>検索結果</h3>
<div id="results">データ読み込み中...</div>
</div>

</div>

<script>

let database={};

fetch("./data.json")
.then(res=>res.json())
.then(data=>{
    database=data;
    initUI();
})
.catch(e=>{
    document.getElementById("results").innerHTML=
    "data.json の読み込みに失敗しました。配置場所を確認してください。";
    console.error(e);
});

function initUI(){

const typeSelect=document.getElementById("type");
const shipSelect=document.getElementById("ship");
const mapSelect=document.getElementById("map");

/* 艦種 */
const types=new Set();
for(const s in database) types.add(database[s].type);
typeSelect.innerHTML='<option value="">指定なし</option>';
types.forEach(t=>typeSelect.innerHTML+=`<option>${t}</option>`);

/* 艦名 */
function updateShips(){
    shipSelect.innerHTML='<option value="">指定なし</option>';
    for(const s in database){
        if(!typeSelect.value || database[s].type==typeSelect.value)
            shipSelect.innerHTML+=`<option>${s}</option>`;
    }
}
typeSelect.onchange=updateShips;
updateShips();

/* 海域 */
const maps=new Set();
for(const ship in database){
    for(const key in database[ship]){
        if(key==="type") continue;
        maps.add(key);
    }
}
mapSelect.innerHTML='<option value="">指定なし</option>';
maps.forEach(m=>mapSelect.innerHTML+=`<option>${m}</option>`);

}

function search(){

const ship=document.getElementById("ship").value;
const map=document.getElementById("map").value;
const node=document.getElementById("node").value;
const rank=document.getElementById("rank").value;

const results=document.getElementById("results");
results.innerHTML="";

let count=0;

for(const shipName in database){

if(ship && shipName!==ship) continue;

const shipData=database[shipName];

for(const area in shipData){

if(area==="type") continue;
if(map && area!==map) continue;

const nodes=shipData[area];

for(const n in nodes){

if(node && n!==node) continue;

const info=nodes[n];
if(!info.get_rank) continue;
if(rank && !info.get_rank.includes(rank)) continue;

count++;

results.innerHTML+=`
<div class="result">
<b>${shipName}</b><br>
海域: ${area} / マス: ${n}<br>
勝利: ${info.get_rank.join(",")}
<button onclick="toggle('d${count}')">詳細</button>

<div id="d${count}" class="detail">
提督Lv: ${info.level[0]}〜${info.level[1]}
</div>
</div>`;
}
}
}

if(count===0) results.innerHTML="該当なし";
}

function toggle(id){
const e=document.getElementById(id);
e.style.display=e.style.display==="block"?"none":"block";
}

</script>

</body>
</html>
