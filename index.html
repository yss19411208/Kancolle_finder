<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<title>艦これドロップ検索</title>

<style>
body{
    font-family: "Segoe UI",sans-serif;
    background:#f2f4f7;
    margin:0;
}
header{
    background:#2b3a55;
    color:white;
    padding:15px;
    font-size:22px;
    text-align:center;
}
.container{
    padding:20px;
    max-width:1000px;
    margin:auto;
}
select{
    padding:8px;
    font-size:16px;
    margin:5px 0 15px 0;
    width:100%;
}
.card{
    background:white;
    border-radius:10px;
    padding:12px;
    margin:10px 0;
    box-shadow:0 2px 6px rgba(0,0,0,0.15);
}
.map{
    font-size:20px;
    font-weight:bold;
    margin-top:15px;
}
.node{
    margin-left:15px;
    margin-top:8px;
    font-weight:bold;
    color:#2b3a55;
}
.drop{
    margin-left:30px;
    padding:4px 0;
    border-bottom:1px solid #eee;
}
.rank{ color:#c0392b; font-weight:bold; }
.level{ color:#2980b9; }
</style>

</head>

<body>
<header>艦これ ドロップ検索</header>

<div class="container">

<select id="mode">
  <option value="map">海域から探す</option>
  <option value="ship">艦から探す</option>
</select>

<div id="mapArea">
  <select id="mapSelect"></select>
</div>

<div id="shipArea" style="display:none">
  <select id="shipSelect"></select>
</div>

<div id="result"></div>

</div>

<script>
let DATA;
const result = document.getElementById("result");
const mode = document.getElementById("mode");
const mapSelect = document.getElementById("mapSelect");
const shipSelect = document.getElementById("shipSelect");
const mapArea = document.getElementById("mapArea");
const shipArea = document.getElementById("shipArea");

fetch("data.json")
.then(r=>r.json())
.then(json=>{
    DATA=json;
    buildLists();
});

function buildLists(){

    // --- 海域一覧生成 ---
    const maps = new Set();
    const ships = new Set();

    for(const ship in DATA){
        ships.add(ship);
        for(const d of DATA[ship]){
            maps.add(d.map);
        }
    }

    mapSelect.innerHTML="";
    [...maps].sort().forEach(m=>{
        mapSelect.innerHTML += `<option>${m}</option>`;
    });

    shipSelect.innerHTML="";
    [...ships].sort().forEach(s=>{
        shipSelect.innerHTML += `<option>${s}</option>`;
    });

    update();
}

mode.onchange=()=>{
    if(mode.value==="map"){
        mapArea.style.display="block";
        shipArea.style.display="none";
    }else{
        mapArea.style.display="none";
        shipArea.style.display="block";
    }
    update();
};

mapSelect.onchange=update;
shipSelect.onchange=update;

function update(){
    result.innerHTML="";

    if(mode.value==="map"){
        showMap();
    }else{
        showShip();
    }
}

function showMap(){
    const selected=mapSelect.value;

    // map → node → ship 構造にまとめる
    const structure={};

    for(const ship in DATA){
        for(const d of DATA[ship]){
            if(d.map!==selected) continue;

            if(!structure[d.node]) structure[d.node]=[];
            structure[d.node].push({ship:ship,data:d});
        }
    }

    for(const node in structure){
        result.innerHTML+=`<div class="map">${selected}</div>`;
        result.innerHTML+=`<div class="node">${node}マス</div>`;

        for(const obj of structure[node]){
            const d=obj.data;
            result.innerHTML+=`
            <div class="drop">
            ${obj.ship}
            <span class="rank">[${d.rank}]</span>
            <span class="level">Lv${d.level_min}~${d.level_max}</span>
            </div>`;
        }
    }
}

function showShip(){
    const selected=shipSelect.value;

    const drops=DATA[selected];
    if(!drops) return;

    let currentMap="";

    for(const d of drops){

        if(currentMap!==d.map){
            currentMap=d.map;
            result.innerHTML+=`<div class="map">${d.map}</div>`;
        }

        result.innerHTML+=`
        <div class="drop">
        ${d.node}マス
        <span class="rank">[${d.rank}]</span>
        <span class="level">Lv${d.level_min}~${d.level_max}</span>
        </div>`;
    }
}
</script>

</body>
</html>
