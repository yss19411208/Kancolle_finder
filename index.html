<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>艦これドロップ検索</title>
<style>
body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:#f3f5f8;margin:0}
header{background:#22324d;color:#fff;padding:14px 16px;font-size:20px;text-align:center}
.container{max-width:1100px;margin:0 auto;padding:16px}
.mode{display:flex;gap:16px;align-items:center;margin-bottom:10px}
.mode label{background:#fff;border-radius:999px;padding:8px 14px;box-shadow:0 1px 3px rgba(0,0,0,.15);cursor:pointer}
.mode input{margin-right:6px}
select{width:100%;padding:10px;border-radius:10px;border:1px solid #cfd6e4;margin:10px 0 14px 0;font-size:15px}
.card{background:#fff;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,.12);padding:16px;margin:14px 0}
.mapTitle{font-size:22px;font-weight:700;margin:10px 0}
.nodeTitle{font-weight:700;color:#1f3a5f;margin:8px 0 4px 10px}
.drop{margin-left:20px;padding:6px 0;border-bottom:1px solid #eef1f6}
.rank{color:#c0392b;font-weight:700;margin-left:6px}
.level{color:#1e7acb;margin-left:6px}
.badge{background:#e8eef9;border-radius:8px;padding:2px 6px;margin-left:6px;font-size:12px}
.notice{color:#56627a;margin:6px 0 12px 0}
.mapImage{width:100%;max-width:600px;height:auto;border-radius:12px;margin:10px 0;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.modifyBox{background:#f0f4ff;border:1px solid #c8d6ff;border-radius:10px;padding:10px;margin:10px 0}
</style>
</head>
<body>
<header>艦これ ドロップ検索</header>
<div class="container">
  <div class="mode">
    <label><input type="radio" name="mode" value="map" checked> 海域から探す</label>
    <label><input type="radio" name="mode" value="ship"> 艦から探す</label>
  </div>

  <div id="mapArea">
    <div class="notice">海域を選択すると、マスごとにドロップ艦と条件が表示されます。</div>
    <select id="mapSelect"></select>
  </div>

  <div id="shipArea" style="display:none">
    <div class="notice">艦種を選択してから艦を選んでください。</div>
    <select id="typeSelect"></select>
    <select id="shipSelect"></select>
  </div>

  <div id="result"></div>
</div>

<script>
let RAW = null;
let mapIndex = {};
let shipIndex = {};
let typeIndex = {}; // type -> ships

const result = document.getElementById('result');
const mapSelect = document.getElementById('mapSelect');
const shipSelect = document.getElementById('shipSelect');
const mapArea = document.getElementById('mapArea');
const shipArea = document.getElementById('shipArea');

function mapSort(a,b){
  const pa=a.split('-').map(Number);
  const pb=b.split('-').map(Number);
  if(pa[0]!==pb[0]) return pa[0]-pb[0];
  return pa[1]-pb[1];
}

fetch('data.json', {cache:'no-store'})
  .then(r=>r.json())
  .then(json=>{
    RAW=json;
    preprocess();
    buildLists();
    update();
  });

function preprocess(){
  typeIndex = {};
  mapIndex={}; shipIndex={};
  for(const [ship,body] of Object.entries(RAW)){
    const type=body.type||'';
    shipIndex[ship]=[];
    if(!typeIndex[type]) typeIndex[type]=[];
    typeIndex[type].push(ship);
    for(const [map,nodes] of Object.entries(body)){
      if(map==='type'||map==='modify') continue;
      if(!mapIndex[map]) mapIndex[map]={};
      for(const [node,cond] of Object.entries(nodes)){
        const level_min=cond.level?.[0]??'';
        const level_max=cond.level?.[1]??'';
        const ranks=(cond.get_rank||[]).join('/');
        shipIndex[ship].push({map,node,ranks,level_min,level_max,type});
        if(!mapIndex[map][node]) mapIndex[map][node]=[];
        mapIndex[map][node].push({ship,ranks,level_min,level_max,type});
      }
    }
  }
}

function buildLists(){
  mapSelect.innerHTML='';
  Object.keys(mapIndex).sort(mapSort).forEach(m=>{
    const op=document.createElement('option'); op.value=m; op.textContent=m; mapSelect.appendChild(op);
  });
  // build type list
  const typeSelect = document.getElementById('typeSelect');
  typeSelect.innerHTML='';
  Object.keys(typeIndex).sort((a,b)=>a.localeCompare(b,'ja')).forEach(t=>{
    const op=document.createElement('option'); op.value=t; op.textContent=t; typeSelect.appendChild(op);
  });

  // initial ship list
  updateShipList();
}

for(const r of document.querySelectorAll('input[name="mode"]')){
  r.addEventListener('change',()=>{
    const v=document.querySelector('input[name="mode"]:checked').value;
    if(v==='map'){mapArea.style.display='block';shipArea.style.display='none';}
    else{mapArea.style.display='none';shipArea.style.display='block';}
    update();
  });
}
mapSelect.onchange=update;
shipSelect.onchange=update;

const typeSelect = document.getElementById('typeSelect');
typeSelect.onchange=()=>{
  updateShipList();
  update();
};

function updateShipList(){
  const typeSelect = document.getElementById('typeSelect');
  const selectedType = typeSelect.value;
  shipSelect.innerHTML='';
  if(!typeIndex[selectedType]) return;
  typeIndex[selectedType].sort((a,b)=>a.localeCompare(b,'ja')).forEach(s=>{
    const op=document.createElement('option'); op.value=s; op.textContent=s; shipSelect.appendChild(op);
  });
}

function update(){

  result.innerHTML='';
  const mode=document.querySelector('input[name="mode"]:checked').value;
  if(mode==='map') showMap(); else showShip();
}

function showMap(){
  const selected=mapSelect.value;
  const nodes=mapIndex[selected];
  if(!nodes) return;
  let html=`<div class="card"><div class="mapTitle">${selected}</div>`;
  html+=`<img class="mapImage" src="image/${selected}.png" onerror="this.style.display='none'">`;
  for(const node of Object.keys(nodes).sort()){
    html+=`<div class="nodeTitle">${node}マス</div>`;
    for(const d of nodes[node].sort((a,b)=>a.ship.localeCompare(b.ship,'ja'))){
      html+=`<div class="drop">${d.ship}<span class="badge">${d.type}</span><span class="rank">[${d.ranks}]</span><span class="level">Lv${d.level_min}~${d.level_max}</span></div>`;
    }
  }
  html+='</div>';
  result.innerHTML=html;
}

function showShip(){
  const ship=shipSelect.value;
  const drops=shipIndex[ship];
  if(!drops) return;
  const byMap={};
  for(const d of drops){if(!byMap[d.map]) byMap[d.map]=[]; byMap[d.map].push(d);}  
  let html=`<div class="card"><div class="mapTitle">${ship}</div>`;
  if(RAW[ship].modify){
    html+='<div class="modifyBox"><strong>改造情報</strong>';
    for(const [k,v] of Object.entries(RAW[ship].modify)){
      html+=`<div>${k} : Lv${v}</div>`;
    }
    html+='</div>';
  }
  Object.keys(byMap).sort(mapSort).forEach(map=>{
    html+=`<div class="mapTitle">${map}</div>`;
    html+=`<img class="mapImage" src="image/${map}.png" onerror="this.style.display='none'">`;
    for(const d of byMap[map].sort((a,b)=>a.node.localeCompare(b.node))){
      html+=`<div class="drop">${d.node}マス <span class="rank">[${d.ranks}]</span><span class="level">Lv${d.level_min}~${d.level_max}</span></div>`;
    }
  });
  html+='</div>';
  result.innerHTML=html;
}
</script>
</body>
</html>
