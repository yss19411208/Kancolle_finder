<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<title>艦これドロップ検索</title>

<style>
body{font-family:sans-serif;background:#0f172a;color:white;margin:0;}
header{background:#1e293b;padding:14px;font-size:22px;font-weight:bold;}
.container{padding:15px;}
.panel{background:#1e293b;padding:15px;margin-bottom:15px;border-radius:12px;}
select{padding:8px;margin:5px;border-radius:8px;border:none;}
button{padding:8px 14px;background:#38bdf8;border:none;border-radius:8px;cursor:pointer;font-weight:bold;}

.shipInfo{
background:#020617;
padding:12px;
border-radius:12px;
margin-bottom:15px;
border-left:5px solid #22c55e;
}

.result{
background:#020617;
padding:12px;
margin-top:10px;
border-radius:10px;
cursor:pointer;
}

.detail{
display:none;
margin-top:8px;
background:#0b1220;
padding:8px;
border-radius:8px;
}
.hidden{display:none;}
</style>

</head>

<body>

<header>艦これ ドロップ検索</header>

<div class="container">

<div class="panel">

<label><input type="radio" name="mode" value="ship" checked onchange="switchMode()"> 艦から探す</label> <label style="margin-left:20px;"><input type="radio" name="mode" value="map" onchange="switchMode()"> 海域から探す</label>

<div id="shipSearch">
<br>
艦種:
<select id="type"></select>
艦名:
<select id="ship"></select>
<br><br>
<button onclick="searchShip()">検索</button>
</div>

<div id="mapSearch" class="hidden">
<br>
海域:
<select id="map"></select>
<br><br>
<button onclick="searchMap()">検索</button>
</div>

</div>

<div id="shipInfo"></div>

<div class="panel">
<h3>検索結果</h3>
<div id="results">データ読み込み中...</div>
</div>

</div>

<script>

let database={};

fetch("./data.json")
.then(r=>r.json())
.then(data=>{
database=data;
initUI();
});

function switchMode(){
const mode=document.querySelector('input[name="mode"]:checked').value;
document.getElementById("shipSearch").classList.toggle("hidden",mode!=="ship");
document.getElementById("mapSearch").classList.toggle("hidden",mode!=="map");
document.getElementById("shipInfo").innerHTML="";
document.getElementById("results").innerHTML="";
}

function initUI(){

/* 艦種 */
const typeSelect=document.getElementById("type");
const types=new Set();
for(const s in database) types.add(database[s].type);
typeSelect.innerHTML='<option value="">指定なし</option>';
types.forEach(t=>typeSelect.innerHTML+=`<option>${t}</option>`);

/* 艦名 */
function updateShips(){
const shipSelect=document.getElementById("ship");
shipSelect.innerHTML='<option value="">選択してください</option>';
for(const s in database){
if(!typeSelect.value || database[s].type===typeSelect.value)
shipSelect.innerHTML+=`<option>${s}</option>`;
}
}
typeSelect.onchange=updateShips;
updateShips();

/* 海域 */
const mapSelect=document.getElementById("map");
const maps=new Set();
for(const ship in database){
for(const key in database[ship]){
if(key==="type"||key==="modify") continue;
maps.add(key);
}
}
mapSelect.innerHTML='<option value="">選択してください</option>';
maps.forEach(m=>mapSelect.innerHTML+=`<option>${m}</option>`);

document.getElementById("results").innerHTML="準備完了";
}

/* 艦検索 */
function searchShip(){

const ship=document.getElementById("ship").value;
if(!ship) return;

const shipData=database[ship];
const infoBox=document.getElementById("shipInfo");
const results=document.getElementById("results");

results.innerHTML="";

/* 改造情報表示 */
let modifyHTML="<div class='shipInfo'><b>"+ship+"</b><br>改造レベル:<br>";

if(shipData.modify){
for(const m in shipData.modify){
modifyHTML+=m+" : Lv"+shipData.modify[m]+"<br>";
}
}else{
modifyHTML+="改造なし";
}

modifyHTML+="</div>";
infoBox.innerHTML=modifyHTML;

/* ドロップ一覧 */
let id=0;

for(const area in shipData){
if(area==="type"||area==="modify") continue;

const nodes=shipData[area];

for(const node in nodes){

const d=nodes[node];
id++;

results.innerHTML+=`
<div class="result" onclick="toggle('d${id}')">
<b>${area}</b> - マス ${node}
<div id="d${id}" class="detail">
勝利: ${d.get_rank.join(",")}<br>
提督Lv: ${d.level[0]}〜${d.level[1]}
</div>
</div>`;
}
}
}

/* 海域検索 */
function searchMap(){

const map=document.getElementById("map").value;
if(!map) return;

document.getElementById("shipInfo").innerHTML="";
const results=document.getElementById("results");
results.innerHTML="";

let id=0;

for(const ship in database){

const shipData=database[ship];
if(!shipData[map]) continue;

const nodes=shipData[map];

for(const node in nodes){

const d=nodes[node];
id++;

results.innerHTML+=`
<div class="result" onclick="toggle('d${id}')">
<b>${ship}</b> - マス ${node}
<div id="d${id}" class="detail">
勝利: ${d.get_rank.join(",")}<br>
提督Lv: ${d.level[0]}〜${d.level[1]}
</div>
</div>`;
}
}
}

function toggle(id){
const e=document.getElementById(id);
e.style.display=e.style.display==="block"?"none":"block";
}

</script>

</body>
</html>
